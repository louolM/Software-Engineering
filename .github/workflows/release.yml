name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (ex: v2.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write      # needed to push Docker image to GHCR

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1 – Unit tests (blocks build + release if any test fails)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore EasySave/EasySave.slnx

      - name: Run unit tests
        run: |
          dotnet test EasySave/EasySave.Tests/EasySave.Tests.csproj \
            --configuration Release \
            --no-restore \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()   # upload even on failure so the report is always available
        with:
          name: test-results
          path: '**/TestResults/**'
          retention-days: 7
  
  # ──────────────────────────────────────────────────────────────────────────
  # Job 2 – Build & publish (only runs when all tests pass)
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.runtime }})
    needs: test
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            artifact_name: EasySave-Windows-x64
            renamed: EasySave-Windows-x64.exe
          - os: ubuntu-latest
            runtime: linux-x64
            artifact_name: EasySave-Linux-x64
            renamed: EasySave-Linux-x64
          - os: macos-latest
            runtime: osx-x64
            artifact_name: EasySave-macOS-x64
            renamed: EasySave-macOS-x64
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux GUI dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libfontconfig1-dev \
            libfreetype6-dev

      - name: Restore dependencies
        run: dotnet restore EasySave/EasySave.slnx -r ${{ matrix.runtime }}

      - name: Publish
        run: |
          dotnet publish EasySave/EasySave.UI/EasySave.UI.csproj \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            --no-restore \
            -o ./publish
        shell: bash

      - name: Rename executable
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            src=$(find ./publish -maxdepth 1 -name "*.exe" | head -n 1)
          else
            src=$(find ./publish -maxdepth 1 -type f \
              ! -name "*.pdb" ! -name "*.xml" \
              ! -name "*.dylib" ! -name "*.so" ! -name "*.a" \
              | head -n 1)
          fi
          echo "Renaming: $src -> ./publish/${{ matrix.renamed }}"
          mv "$src" ./publish/${{ matrix.renamed }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./publish/${{ matrix.renamed }}
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3 – Build & push Docker image for LogServer
  # ──────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker – LogServer
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag name and owner
        id: tag
        run: |
          echo "TAG=${{ github.event.inputs.tag || github.ref_name }}" >> $GITHUB_OUTPUT
          echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: EasySave                    # repo root — matches Dockerfile COPY paths
          file: EasySave/LogServer/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.tag.outputs.OWNER }}/easysave-logserver:${{ steps.tag.outputs.TAG }}
            ghcr.io/${{ steps.tag.outputs.OWNER }}/easysave-logserver:latest

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4 – GitHub Release (only runs when all builds + Docker pass)
  # ──────────────────────────────────────────────────────────────────────────
  release:
    needs: [build, docker]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code         # needed to include docker-compose.yml in release
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Release ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/EasySave-Windows-x64/EasySave-Windows-x64.exe
            ./artifacts/EasySave-Linux-x64/EasySave-Linux-x64
            ./artifacts/EasySave-macOS-x64/EasySave-macOS-x64
            ./LogServer/docker-compose.yml