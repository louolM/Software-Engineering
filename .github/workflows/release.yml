name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (ex: v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            artifact_name: EasySave-Windows-x64
            binary: EasySave.ConsoleApp.exe
            renamed: EasySave-Windows-x64.exe
          - os: ubuntu-latest
            runtime: linux-x64
            artifact_name: EasySave-Linux-x64
            binary: EasySave.ConsoleApp
            renamed: EasySave-Linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore EasySave/EasySave.slnx -r ${{ matrix.runtime }}

      - name: Publish
        run: |
          dotnet publish EasySave/EasySave.ConsoleApp/EasySave.ConsoleApp.csproj \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeAllContentForSelfExtract=true \
            -p:DebugType=embedded \
            --no-restore \
            -o ./publish
        shell: bash

      - name: Rename executable
        run: mv ./publish/${{ matrix.binary }} ./publish/${{ matrix.renamed }}
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./publish/${{ matrix.renamed }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Release ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/EasySave-Windows-x64/EasySave-Windows-x64.exe
            ./artifacts/EasySave-Linux-x64/EasySave-Linux-x64