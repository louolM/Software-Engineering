name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (ex: v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
            artifact_name: EasySave-Windows-x64
          - os: ubuntu-latest
            runtime: linux-x64
            artifact_name: EasySave-Linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore EasySave/EasySave.sln

      - name: Publish
        run: |
          dotnet publish EasySave/EasySave/EasySave.ConsoleApp/EasySave.ConsoleApp.csproj \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeAllContentForSelfExtract=true \
            -p:DebugType=embedded \
            --no-restore \
            -o ./publish

      - name: Rename Linux executable
        if: matrix.os == 'ubuntu-latest'
        run: mv ./publish/EasySave.ConsoleApp ./publish/EasySave-Linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./publish/*
          retention-days: 1